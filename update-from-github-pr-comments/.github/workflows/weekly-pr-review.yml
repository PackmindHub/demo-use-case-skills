name: Weekly PR Review Mining

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back'
        required: false
        default: '90'
        type: string
      repo:
        description: 'owner/repo override (leave empty to infer from git remote)'
        required: false
        default: ''
        type: string
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-sonnet-4-6'
        type: string

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  pr-review-mining:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.API_GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Packmind CLI
        run: npm install -g @packmind/cli

      - name: Run PR Review Mining
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.API_GH_TOKEN }}
          prompt: "/github-pr-review --non-interactive --days ${{ inputs.days || '7' }} ${{ inputs.repo && format('--repo {0}', inputs.repo) || '' }}"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(echo *)",
                  "Bash(git remote *)",
                  "Bash(mkdir *)",
                  "mcp__github__search_pull_requests",
                  "mcp__github__pull_request_read",
                  "Read",
                  "Write",
                  "Glob",
                  "Grep"
                ]
              }
            }
          claude_args: "--mcp-config '{\"mcpServers\": {\"github\": {\"type\":\"http\",\"url\":\"https://api.githubcopilot.com/mcp\",\"headers\":{\"Authorization\":\"Bearer ${{ secrets.API_GH_TOKEN }}\"}}}}' --model ${{ inputs.model || 'claude-sonnet-4-6' }} --max-turns 30"
        env:
          PACKMIND_API_KEY_V3: ${{ secrets.PACKMIND_API_KEY_V3 }}

      - name: Display reports
        if: always()
        run: |
          found=false
          for f in .claude/reports/*.md; do
            if [ -f "$f" ]; then
              found=true
              echo "=== Report: $(basename "$f") ==="
              cat "$f"
              echo "## $(basename "$f")" >> "$GITHUB_STEP_SUMMARY"
              cat "$f" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ "$found" = false ]; then
            echo "No report files found."
            echo "No report files found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-reports
          path: .claude/reports/
          if-no-files-found: warn
          retention-days: 30
